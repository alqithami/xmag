experiment:
  name: real_5g_nidd_slowratedos
  output_dir: runs/real_holdout_slowratedos
  random_state: 42
  test_size: 0.30
  validation_size: 0.20
  max_rows: null

dataset:
  path: data/5G-NIDD/Encoded.csv
  label_column: Attack Type
  benign_labels: [Benign, BENIGN, benign, Normal, normal]
  unknown_attack: SlowrateDoS
  drop_columns: [Attack Tool, Label, sVid, dVid, "54"]
  leakage_patterns: [label, attack tool, attack_tool, scenario, timestamp, time, source ip, destination ip, src ip, dst ip, srcport, dstport]

agents:
  n_agents: 8
  mapping: transparent_hash
  agent_column: null

model:
  local_model: random_forest
  centralized_model: random_forest
  n_estimators: 30
  max_depth: null
  min_samples_leaf: 2
  class_weight: balanced_subsample

explanation:
  method: feature_importance
  k_values: [1, 3, 5]
  message_overhead_bytes: 8
  feature_id_bytes: 2
  value_bytes: 4
  include_uncertainty: true
